apiVersion: apps/v1
kind: Deployment
metadata:
  name: canada-devops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: canada-devops-app

  template:
    metadata:
      labels:
        app: canada-devops-app

    spec:
      containers:
      - name: canada-devops-container
        image: 660405908881.dkr.ecr.ap-south-1.amazonaws.com/canada-devops-app:v1


        ports:
        - containerPort: 5000

        env:
        - name: ENVIRONMENT
          value: "production"

        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"

          limits:
            memory: "256Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 5
          periodSeconds: 3
