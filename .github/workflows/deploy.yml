name: Canada DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t canada-devops-app:v1 ./app

    - name: Tag Docker Image
      run: |
        docker tag canada-devops-app:v1 660405908881.dkr.ecr.ap-south-1.amazonaws.com/canada-devops-app:v1

    - name: Push Docker Image
      run: |
        docker push 660405908881.dkr.ecr.ap-south-1.amazonaws.com/canada-devops-app:v1
